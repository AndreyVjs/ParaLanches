<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <title>Parah Lanches</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- linkando o css com o html -->
    <link rel="Stylesheet" href="css/style.css">




</head>

<body>

    <h1>Login Parah Lanches</h1>

    <!-- container principal da pagina de login -->
    <div class="container">
        <div class="box">

            <form>

                <p>Login</p>
                <!-- campo de texto pro usuario digitar o login -->
                <input type="text" name="login" id="login" placeholder="Digite seu login">

                <p>Senha</p>
                <!-- campo de senha, o type password esconde os caracteres -->
                <input type="password" name="senha" id="senha" placeholder="Digite sua senha">

                <!-- botao que chama a funcao de mostrar/esconder a senha -->
                <button type="button" onclick="mostrarSenha()">👁️</button>

                <br><br>

                <!-- botao de entrar que verifica o login -->
                <button class="button" onclick="verificarlogin()">Entrar</button>

            </form>

        </div>
    </div>

    <!-- linkando o js no final do body pra garantir que o html carrega primeiro -->
    <script src="js/script.js"></script>
</body>

</html>
