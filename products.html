<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanches</title>
    <!-- usando o mesmo css da pagina de login -->
    <link rel="Stylesheet" href="css/style.css">
</head>

<body>

    <h1>Nossos Lanches</h1>

    <!-- area onde os produtos ficam listados -->
    <div class="produtos-area">

        <!-- card de um produto -->
        <div class="card-produto">

            <!-- imagem do produto com efeito de hover -->
            <img src="img/x-salada.jpg" alt="X-Salada">

            <!-- titulo do produto -->
            <h2 class="card-titulo">X-Salada</h2>

            <!-- subtitulo com o preco -->
            <span class="card-subtitulo">R$ 18,00</span>

            <!-- descricao com os ingredientes -->
            <p class="card-descricao">Pão brioche, hamburguer 150g, queijo, alface, tomate e dois molhos especiais da casa.</p>

        </div>

    </div>

</body>

</html>
